version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskapp_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: taskapp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apptraining-2-back
      dockerfile: Dockerfile
    container_name: taskapp_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: taskapp
      DB_PORT: 5432
    ports:
      - "3002:3002"

  frontend:
    build:
      context: ./apptraining-2-front
      dockerfile: Dockerfile
    container_name: taskapp_frontend
    depends_on:
      - backend
    ports:
      - "3001:3001"

volumes:
  db_data:

