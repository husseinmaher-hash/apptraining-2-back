name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip


      - name: Rebuild Docker
        run: |
          docker compose up --build -d backend
