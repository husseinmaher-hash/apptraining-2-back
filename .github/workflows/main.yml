name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set working directory
        run: cd ..

      - name: Rebuild Docker
        run: 
          docker compose -f ../docker-compose.yml up --build -d
